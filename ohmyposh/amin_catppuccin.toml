console_title_template = '{{.UserName}}@{{.HostName}}'
version = 3
final_space = true

[palette]
  base = '#1e1e2e'
  surface = '#313244'
  overlay = '#6c7086'

  text = '#cdd6f4'
  subtext = '#bac2de'

  blue = '#89b4fa'
  green = '#a6e3a1'
  yellow = '#f9e2af'
  peach = '#fab387'
  red = '#f38ba8'
  mauve = '#cba6f7'
  teal = '#94e2d5'

[secondary_prompt]
  template = '<p:yellow,transparent></><,p:yellow> > </><p:yellow,transparent></> '
  foreground = 'p:base'
  background = 'transparent'

[transient_prompt]
  template = '<p:blue,transparent></><,p:blue> {{ .Folder }} </><p:blue,transparent></> '
  foreground = 'p:base'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true
  [[blocks.segments]]
      leading_diamond = ''
      template = ' {{.Icon}} '
      foreground = 'p:surface'
      background = 'p:mauve'
      type = 'os'
      style = 'diamond'

  [[blocks.segments]]
    trailing_diamond = ''
    template = ' {{ if .SSHSession }} {{ end }}{{ .UserName }} '
    foreground = 'p:base'
    background = 'p:mauve'
    type = 'session'
    style = 'diamond'

  [[blocks.segments]]
    template = '  {{ path .Path .Location }} '
    foreground = 'p:base'
    powerline_symbol = ''
    background = 'p:blue'
    type = 'path'
    style = 'powerline'

    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    template = ' {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} '
    foreground = 'p:base'
    powerline_symbol = ''
    background = 'p:green'
    type = 'git'
    style = 'powerline'

    foreground_templates = [
      '{{ if or (.Working.Changed) (.Staging.Changed) }}p:base{{ end }}',
      '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:base{{ end }}',
      '{{ if gt .Ahead 0 }}p:base{{ end }}',
      '{{ if gt .Behind 0 }}p:text{{ end }}'
    ]

    background_templates = [
      '{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}',
      '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}',
      '{{ if gt .Ahead 0 }}p:mauve{{ end }}',
      '{{ if gt .Behind 0 }}p:overlay{{ end }}'
    ]

    [blocks.segments.properties]
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    template = '  '
    foreground = 'p:base'
    powerline_symbol = ''
    background = 'p:red'
    type = 'root'
    style = 'powerline'

  [[blocks.segments]]
    leading_diamond = '<transparent,background></>'
    trailing_diamond = ''
    template = ' {{ if gt .Code 0 }}{{ else }}{{ end }} '
    foreground = 'p:base'
    background = 'p:teal'
    type = 'status'
    style = 'diamond'
    background_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']

    [blocks.segments.properties]
      always_enabled = true

[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    template = ' '
    foreground = 'p:green'
    background = 'transparent'
    type = 'node'
    style = 'plain'

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_package_manager = false
      home_enabled = false

  [[blocks.segments]]
    template = ' '
    foreground = 'p:blue'
    background = 'transparent'
    type = 'go'
    style = 'plain'

    [blocks.segments.properties]
      fetch_version = false

  [[blocks.segments]]
    template = ' '
    foreground = 'p:mauve'
    background = 'transparent'
    type = 'python'
    style = 'plain'

    [blocks.segments.properties]
      display_mode = 'files'
      fetch_version = false
      fetch_virtual_env = false

  [[blocks.segments]]
    template = 'in <p:blue><b>{{ .Name }}</b></> '
    foreground = 'p:subtext'
    background = 'transparent'
    type = 'shell'
    style = 'plain'

  [[blocks.segments]]
    template = 'at <p:blue><b>{{ .CurrentDate | date "15:04:05" }}</b></>'
    foreground = 'p:subtext'
    background = 'transparent'
    type = 'time'
    style = 'plain'

[[tooltips]]
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:base'
  background = 'p:peach'
  type = 'aws'
  style = 'diamond'
  tips = ['aws']

  [tooltips.properties]
    display_default = true

[[tooltips]]
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Name }} '
  foreground = 'p:base'
  background = 'p:blue'
  type = 'az'
  style = 'diamond'
  tips = ['az']

  [tooltips.properties]
    display_default = true
