# --- General Settings ---
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -sg escape-time 0          # Fixes Neovim escape lag
set -g focus-events on
set -g allow-passthrough on    # Required for Yazi image previews

## Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

## Status bar on top
set-option -g status-position top

## Use XDG variable if it exists, otherwise default to ~/.config
if-shell 'test -z "$XDG_CONFIG_HOME"' \
    'set -g @config_path "$HOME/.config/tmux"' \
    'set -g @config_path "$XDG_CONFIG_HOME/tmux"'

# --- Keybindings ---
unbind r
bind r source-file -F "#{@config_path}/tmux.conf" \; display "Configuration Reloaded!"

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

## Vim-style pane selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

## Use Alt-H/L to switch windows
bind -n M-H previous-window
bind -n M-L next-window

## Open panes in current directory + intuitive ones
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

## Vi-mode for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'

if-shell 'test -z "$XDG_DATA_HOME"' \
    'set -g @plugins_path "$HOME/.local/share/tmux/plugins"' \
    'set -g @plugins_path "$XDG_DATA_HOME/tmux/plugins"'
set-environment -gF TMUX_PLUGIN_MANAGER_PATH "#{@plugins_path}/"

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'soyuka/tmux-current-pane-hostname'
#set -g @plugin 'catppuccin/tmux'

## Auto-install Catppuccin if missing
if "test ! -d #{@plugins_path}/catppuccin" \
    "run 'git clone --depth=1 -b v2.3.0 https://github.com/catppuccin/tmux.git #{@plugins_path}/catppuccin/tmux'"
run '#{@plugins_path}/catppuccin/tmux/catppuccin.tmux'

## Catppuccin v2.3.0 Configuration
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_host_text " ##U@##H"

## Status Bar Styling
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"

# --- Bootstrap TPM & Plugins ---
if "test ! -d #{@plugins_path}/tpm" \
    "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm #{@plugins_path}/tpm && #{@plugins_path}/tpm/bin/install_plugins''"
run '#{@plugins_path}/tpm/tpm'
